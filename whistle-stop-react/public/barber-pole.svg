<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="poleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f5f5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e0e0;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#c0c0c0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a0a0a0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Glass cylinder background -->
  <rect x="35" y="15" width="30" height="70" rx="15" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  
  <!-- Red and white stripes -->
  <rect x="38" y="18" width="24" height="64" rx="12" fill="url(#poleGrad)" opacity="0.9"/>
  
  <!-- Stripe overlay for spiral effect -->
  <path d="M38 25 Q50 20 62 25" stroke="#f5f5f5" stroke-width="3" fill="none" opacity="0.6"/>
  <path d="M38 35 Q50 30 62 35" stroke="#dc2626" stroke-width="3" fill="none" opacity="0.6"/>
  <path d="M38 45 Q50 40 62 45" stroke="#f5f5f5" stroke-width="3" fill="none" opacity="0.6"/>
  <path d="M38 55 Q50 50 62 55" stroke="#dc2626" stroke-width="3" fill="none" opacity="0.6"/>
  <path d="M38 65 Q50 60 62 65" stroke="#f5f5f5" stroke-width="3" fill="none" opacity="0.6"/>
  <path d="M38 75 Q50 70 62 75" stroke="#dc2626" stroke-width="3" fill="none" opacity="0.6"/>
  
  <!-- Top cap -->
  <ellipse cx="50" cy="15" rx="16" ry="6" fill="url(#metalGrad)"/>
  <ellipse cx="50" cy="13" rx="14" ry="5" fill="#e0e0e0"/>
  
  <!-- Bottom cap -->
  <ellipse cx="50" cy="85" rx="16" ry="6" fill="url(#metalGrad)"/>
  <ellipse cx="50" cy="87" rx="14" ry="5" fill="#e0e0e0"/>
  
  <!-- Top ring -->
  <ellipse cx="50" cy="15" rx="17" ry="4" fill="none" stroke="url(#metalGrad)" stroke-width="2"/>
  
  <!-- Bottom ring -->
  <ellipse cx="50" cy="85" rx="17" ry="4" fill="none" stroke="url(#metalGrad)" stroke-width="2"/>
</svg>
